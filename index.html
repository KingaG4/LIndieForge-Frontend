<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIndieForge - Studio Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary" style="background-color: #1e1e1e;">
    <div class="container">
        <a class="navbar-brand text-primary fw-bold" href="#" data-route="dashboard">
            <i class="bi bi-controller"></i> LIndieForge
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" data-route="dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-route="games">Games</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item me-3 d-flex align-items-center">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-dark text-light border-secondary"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control bg-dark text-light border-secondary" id="global-search" placeholder="Search...">
                    </div>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-route="profile"><i class="bi bi-person-circle"></i> Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="#" data-route="login"><i class="bi bi-box-arrow-right"></i> Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb" id="breadcrumb-container">
            <li class="breadcrumb-item active">Dashboard</li>
        </ol>
    </nav>
</div>

<div class="container mb-5">
    <div id="app-container">
        <div class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/api.js"></script>
<script src="js/components/table.js"></script>
<script src="js/components/form.js"></script>
<script src="js/components/modal.js"></script>
<script src="js/pages/home.js"></script>
<script src="js/pages/list.js"></script>
<script src="js/pages/details.js"></script>
<script src="js/pages/edit.js"></script>
<script src="js/app.js"></script>
</body>
</html>
